name: mikro
region: nyc

services:
  # Backend - Flask API
  - name: mikro-backend
    github:
      repo: KaartGroup/Mikro
      branch: master
      deploy_on_push: true
    source_dir: backend
    environment_slug: python
    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 8080
    routes:
      - path: /api
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      # Flask
      - key: FLASK_APP
        value: app.py
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        type: SECRET
        value: ${SECRET_KEY}

      # Database - auto-populated by DigitalOcean when database is attached
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

      # Auth0
      - key: AUTH0_DOMAIN
        type: SECRET
        value: ${AUTH0_DOMAIN}
      - key: API_AUDIENCE
        value: https://mikro/api/authorize
      # The login app's client_id — used as the `client_id` when creating org
      # invitations so the invitation is bound to the Regular Web App that
      # users actually sign in with. Without it, invite_user falls back to the
      # M2M client_id, and an invitation bound to a non-interactive M2M app
      # fails signup ("Something went wrong"). Same value the frontend uses.
      - key: AUTH0_APP_CLIENT_ID
        type: SECRET
        value: ${AUTH0_CLIENT_ID}

      # Tasking Manager 4
      - key: TM4_API_TOKEN
        type: SECRET
        value: ${TM4_API_TOKEN}
      - key: TM4_API_URL
        value: https://tasks.kaart.com/api/v2

      # DigitalOcean Spaces
      - key: DO_SPACES_KEY
        type: SECRET
        value: ${DO_SPACES_KEY}
      - key: DO_SPACES_SECRET
        type: SECRET
        value: ${DO_SPACES_SECRET}
      - key: DO_SPACES_ENDPOINT
        value: ${DO_SPACES_ENDPOINT}
      - key: DO_SPACES_BUCKET
        value: ${DO_SPACES_BUCKET}
      - key: DO_SPACES_REGION
        value: ${DO_SPACES_REGION}

      # Comms service (internal routing)
      - key: COMMS_URL
        value: http://comms:8080
      - key: COMMS_WEBHOOK_SECRET
        type: SECRET
        value: ${COMMS_WEBHOOK_SECRET}

  # Frontend - Next.js
  - name: mikro-frontend
    github:
      repo: KaartGroup/Mikro
      branch: master
      deploy_on_push: true
    source_dir: frontend/mikro-next
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 3000
    build_command: npm run build
    run_command: npm start
    routes:
      - path: /
    health_check:
      http_path: /
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      # Auth0 - SDK v4 requires these exact names
      - key: AUTH0_SECRET
        type: SECRET
        value: ${AUTH0_SECRET}
      - key: AUTH0_ISSUER_BASE_URL
        value: https://${AUTH0_DOMAIN}
      - key: AUTH0_BASE_URL
        value: ${APP_BASE_URL}
      - key: AUTH0_CLIENT_ID
        type: SECRET
        value: ${AUTH0_CLIENT_ID}
      - key: AUTH0_CLIENT_SECRET
        type: SECRET
        value: ${AUTH0_CLIENT_SECRET}
      - key: AUTH0_AUDIENCE
        value: https://mikro/api/authorize

      # App URLs
      - key: APP_BASE_URL
        value: ${APP_BASE_URL}
      - key: NEXT_PUBLIC_API_URL
        value: ${APP_BASE_URL}/api

      # Backend API (internal routing)
      - key: FLASK_BACKEND_URL
        value: http://mikro-backend:8080

  # Comms - shared notifications / email service.
  # Deploys from its OWN branch (comms-release), NOT master, so Mikro pushes
  # never rebuild comms and comms pushes never rebuild Mikro. Ship comms by
  # advancing comms-release (fast-forward from master, or merge).
  - name: comms
    github:
      repo: KaartGroup/Mikro
      branch: comms-release
      deploy_on_push: true
    source_dir: comms
    environment_slug: python
    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 8080
    run_command: gunicorn -b 0.0.0.0:8080 wsgi:application
    routes:
      # Public route so Viewer/TM4 (separate DO apps) can reach comms over HTTPS.
      # App Platform strips this prefix before forwarding.
      # Must match the live route — the live app uses /mikro-comms.
      - path: /mikro-comms
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    jobs:
      - name: comms-migrate
        kind: PRE_DEPLOY
        github:
          repo: KaartGroup/Mikro
          branch: comms-release
          deploy_on_push: true
        source_dir: comms
        environment_slug: python
        instance_count: 1
        instance_size_slug: professional-xs
        # cwd is comms/ (source_dir), so alembic.ini path is relative to that.
        run_command: python -m alembic -c migrations/alembic.ini upgrade head
        envs:
          # Force UTF-8 so configparser reads alembic.ini under the container's
          # ASCII locale (belt-and-suspenders; the ini is ASCII-only).
          - key: PYTHONUTF8
            value: "1"
          - key: COMMS_DATABASE_URL
            scope: RUN_TIME
            value: ${comms-db.DATABASE_URL}
          - key: AUTH0_DOMAIN
            type: SECRET
            value: ${AUTH0_DOMAIN}
          - key: API_AUDIENCES
            value: ${COMMS_API_AUDIENCES}
          - key: COMMS_WEBHOOK_SECRET
            type: SECRET
            value: ${COMMS_WEBHOOK_SECRET}
    envs:
      - key: COMMS_DATABASE_URL
        scope: RUN_TIME
        value: ${comms-db.DATABASE_URL}
      - key: AUTH0_DOMAIN
        type: SECRET
        value: ${AUTH0_DOMAIN}
      - key: API_AUDIENCES
        value: ${COMMS_API_AUDIENCES}
      - key: COMMS_WEBHOOK_SECRET
        type: SECRET
        value: ${COMMS_WEBHOOK_SECRET}
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        type: SECRET
        value: ${SMTP_USERNAME}
      - key: SMTP_PASSWORD
        type: SECRET
        value: ${SMTP_PASSWORD}
      - key: SMTP_FROM_EMAIL
        value: ${SMTP_FROM_EMAIL}
      - key: SMTP_FROM_NAME
        value: Kaart
      - key: COMMS_BASE_URL
        value: ${APP_BASE_URL}
      - key: ORG_CLAIM_KEYS
        value: mikro/org_id,tm/org_id,viewer/org_id,org_id
      - key: ROLES_CLAIM_KEYS
        value: mikro/roles,tm/roles,viewer/roles,roles
      - key: NOTIFICATION_RETENTION_DAYS
        value: "90"

workers:
  # Background worker - nightly task sync, element analysis, MR backfill,
  # and long-audio transcription (Whisper). 2GB keeps the whisper model
  # (~500MB) plus audio-chunk buffers (~20MB each) plus Flask overhead
  # well clear of the OOM line even on hour-plus recordings.
  - name: mikro-worker
    github:
      repo: KaartGroup/Mikro
      branch: master
      deploy_on_push: true
    source_dir: backend
    environment_slug: python
    instance_count: 1
    instance_size_slug: professional-s
    run_command: python -m api.worker
    envs:
      # Database
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

      # Flask
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        type: SECRET
        value: ${SECRET_KEY}

      # Auth0
      - key: AUTH0_DOMAIN
        type: SECRET
        value: ${AUTH0_DOMAIN}
      - key: API_AUDIENCE
        value: https://mikro/api/authorize

      # Tasking Manager 4
      - key: TM4_API_TOKEN
        type: SECRET
        value: ${TM4_API_TOKEN}
      - key: TM4_API_URL
        value: https://tasks.kaart.com/api/v2

      # DigitalOcean Spaces
      - key: DO_SPACES_KEY
        type: SECRET
        value: ${DO_SPACES_KEY}
      - key: DO_SPACES_SECRET
        type: SECRET
        value: ${DO_SPACES_SECRET}
      - key: DO_SPACES_ENDPOINT
        value: ${DO_SPACES_ENDPOINT}
      - key: DO_SPACES_BUCKET
        value: ${DO_SPACES_BUCKET}
      - key: DO_SPACES_REGION
        value: ${DO_SPACES_REGION}

      # Whisper transcription
      - key: WHISPER_MODEL
        value: ${WHISPER_MODEL}
      - key: WHISPER_THREADS
        value: ${WHISPER_THREADS}

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb
    num_nodes: 1
  - name: comms-db
    engine: PG
    version: "16"
    # cluster_name: <existing-mikro-pg-cluster-name>   # share the cluster
    # production: true                                  # required when sharing
