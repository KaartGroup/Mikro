name: mikro
region: nyc

services:
  # Backend - Flask API
  - name: mikro-backend
    github:
      repo: KaartGroup/Mikro
      branch: master
      deploy_on_push: true
    source_dir: backend
    environment_slug: python
    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 8080
    routes:
      - path: /api
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      # Flask
      - key: FLASK_APP
        value: app.py
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        type: SECRET
        value: ${SECRET_KEY}

      # Database - auto-populated by DigitalOcean when database is attached
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

      # Auth0
      - key: AUTH0_DOMAIN
        type: SECRET
        value: ${AUTH0_DOMAIN}
      - key: API_AUDIENCE
        value: https://mikro/api/authorize
      # The login app's client_id — used as the `client_id` when creating org
      # invitations so the invitation is bound to the Regular Web App that
      # users actually sign in with. Without it, invite_user falls back to the
      # M2M client_id, and an invitation bound to a non-interactive M2M app
      # fails signup ("Something went wrong"). Same value the frontend uses.
      - key: AUTH0_APP_CLIENT_ID
        type: SECRET
        value: ${AUTH0_CLIENT_ID}

      # Tasking Manager 4
      - key: TM4_API_TOKEN
        type: SECRET
        value: ${TM4_API_TOKEN}
      - key: TM4_API_URL
        value: https://tasks.kaart.com/api/v2

      # DigitalOcean Spaces
      - key: DO_SPACES_KEY
        type: SECRET
        value: ${DO_SPACES_KEY}
      - key: DO_SPACES_SECRET
        type: SECRET
        value: ${DO_SPACES_SECRET}
      - key: DO_SPACES_ENDPOINT
        value: ${DO_SPACES_ENDPOINT}
      - key: DO_SPACES_BUCKET
        value: ${DO_SPACES_BUCKET}
      - key: DO_SPACES_REGION
        value: ${DO_SPACES_REGION}

  # Frontend - Next.js
  - name: mikro-frontend
    github:
      repo: KaartGroup/Mikro
      branch: master
      deploy_on_push: true
    source_dir: frontend/mikro-next
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 3000
    build_command: npm run build
    run_command: npm start
    routes:
      - path: /
    health_check:
      http_path: /
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      # Auth0 - SDK v4 requires these exact names
      - key: AUTH0_SECRET
        type: SECRET
        value: ${AUTH0_SECRET}
      - key: AUTH0_ISSUER_BASE_URL
        value: https://${AUTH0_DOMAIN}
      - key: AUTH0_BASE_URL
        value: ${APP_BASE_URL}
      - key: AUTH0_CLIENT_ID
        type: SECRET
        value: ${AUTH0_CLIENT_ID}
      - key: AUTH0_CLIENT_SECRET
        type: SECRET
        value: ${AUTH0_CLIENT_SECRET}
      - key: AUTH0_AUDIENCE
        value: https://mikro/api/authorize

      # App URLs
      - key: APP_BASE_URL
        value: ${APP_BASE_URL}
      - key: NEXT_PUBLIC_API_URL
        value: ${APP_BASE_URL}/api

      # Backend API (internal routing)
      - key: FLASK_BACKEND_URL
        value: http://mikro-backend:8080

workers:
  # Background worker - nightly task sync, element analysis, MR backfill,
  # and long-audio transcription (Whisper). 2GB keeps the whisper model
  # (~500MB) plus audio-chunk buffers (~20MB each) plus Flask overhead
  # well clear of the OOM line even on hour-plus recordings.
  - name: mikro-worker
    github:
      repo: KaartGroup/Mikro
      branch: master
      deploy_on_push: true
    source_dir: backend
    environment_slug: python
    instance_count: 1
    instance_size_slug: professional-s
    run_command: python -m api.worker
    envs:
      # Database
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

      # Flask
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        type: SECRET
        value: ${SECRET_KEY}

      # Auth0
      - key: AUTH0_DOMAIN
        type: SECRET
        value: ${AUTH0_DOMAIN}
      - key: API_AUDIENCE
        value: https://mikro/api/authorize

      # Tasking Manager 4
      - key: TM4_API_TOKEN
        type: SECRET
        value: ${TM4_API_TOKEN}
      - key: TM4_API_URL
        value: https://tasks.kaart.com/api/v2

      # DigitalOcean Spaces
      - key: DO_SPACES_KEY
        type: SECRET
        value: ${DO_SPACES_KEY}
      - key: DO_SPACES_SECRET
        type: SECRET
        value: ${DO_SPACES_SECRET}
      - key: DO_SPACES_ENDPOINT
        value: ${DO_SPACES_ENDPOINT}
      - key: DO_SPACES_BUCKET
        value: ${DO_SPACES_BUCKET}
      - key: DO_SPACES_REGION
        value: ${DO_SPACES_REGION}

      # Whisper transcription
      - key: WHISPER_MODEL
        value: ${WHISPER_MODEL}
      - key: WHISPER_THREADS
        value: ${WHISPER_THREADS}

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb
    num_nodes: 1
