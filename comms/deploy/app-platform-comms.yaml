# ────────────────────────────────────────────────────────────────────────────
# Kaart Comms — DigitalOcean App Platform component fragment
# ────────────────────────────────────────────────────────────────────────────
#
# Mikro deploys on DigitalOcean App Platform. The live app spec lives at the
# repo root in `.do/app.yaml` (services: mikro-backend, mikro-frontend;
# workers: mikro-worker; databases: db).
#
# This file is NOT a standalone app spec. It is the comms component, written
# so it can be merged INTO Mikro's existing `.do/app.yaml`. Comms ships as its
# own App Platform `service` (its own process, its own source dir, its own
# managed database) inside Mikro's DO team/app — so it shares the cluster and
# DO team but stays isolated at the process + schema level.
#
# HOW TO MERGE INTO `.do/app.yaml`:
#   1. Append the entry under `services:` below into the top-level
#      `services:` list in `.do/app.yaml` (alongside mikro-backend /
#      mikro-frontend).
#   2. Append the entry under `databases:` below into the top-level
#      `databases:` list in `.do/app.yaml` (alongside `db`). This is a SECOND
#      logical database on the SAME managed PG cluster — App Platform creates a
#      separate logical DB and injects its own connection string.
#   3. Add the two CLIENT-side env vars to the `mikro-backend` service so Mikro
#      can reach comms (see comms/deploy/README.md → "Client-side env"):
#         - COMMS_URL            = http://comms:8080   (internal routing)
#         - COMMS_WEBHOOK_SECRET = ${COMMS_WEBHOOK_SECRET}  (same shared secret)
#
# Apply with:  doctl apps update <APP_ID> --spec .do/app.yaml
#         (or:  doctl apps spec validate .do/app.yaml  to check first)
#
# Once the planned mono-project consolidation happens, the public `/comms`
# route can be dropped and every caller uses the internal `http://comms:8080`
# DNS name — no application code change required.
# ────────────────────────────────────────────────────────────────────────────

services:
  # Kaart Comms — shared notifications / email service (Phase 3: messenger).
  # Own process, own source dir (comms/), own managed DB. Lives in Mikro's
  # DO app so the internal service-mesh name `comms` is reachable by
  # mikro-backend; exposed publicly on /comms so other-team apps (Viewer, TM4)
  # — which live in DIFFERENT DO apps — can reach it over HTTPS.
  - name: comms
    github:
      repo: KaartGroup/Mikro
      branch: master
      deploy_on_push: true
    # Build/run from the comms package. App Platform's python buildpack installs
    # comms/requirements.txt found in this source_dir.
    source_dir: comms
    environment_slug: python
    instance_count: 1
    # professional-xs matches mikro-backend; comms is light (Flask + SMTP +
    # JWKS). Bump to professional-s only if campaign fan-out volume warrants it.
    instance_size_slug: professional-xs
    http_port: 8080
    # IMPORTANT: source_dir is comms/, so App Platform runs the command with the
    # working dir INSIDE the package (cwd = .../comms). At that point `comms` is
    # NOT an importable package name (its parent isn't on sys.path), so the
    # entrypoint must be the TOP-LEVEL module `wsgi:application` — not
    # `comms.wsgi:application` (which would fail to import before wsgi.py loads).
    # comms/wsgi.py self-bootstraps the package path, so `wsgi:application` works.
    run_command: gunicorn -b 0.0.0.0:8080 wsgi:application
    routes:
      # PUBLIC route — so Viewer / TM4 (separate DO apps) can POST /emit/* over
      # HTTPS and browsers can hit /notifications/* and /email/*. App Platform
      # strips this prefix before forwarding, so the app still sees /emit,
      # /health, etc. Callers use https://<mikro-domain>/comms/emit/notify .
      - path: /comms
    health_check:
      # GET /health is a no-auth liveness probe (comms/views/health.py).
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    # Pre-deploy / release: run the comms Alembic chain (its OWN chain, NOT
    # Mikro's `flask db upgrade`). Runs once per deploy before traffic shifts.
    jobs:
      - name: comms-migrate
        kind: PRE_DEPLOY
        github:
          repo: KaartGroup/Mikro
          branch: master
          deploy_on_push: true
        source_dir: comms
        environment_slug: python
        instance_count: 1
        instance_size_slug: professional-xs
        # alembic.ini lives at comms/migrations/alembic.ini; env.py resolves the
        # URL from COMMS_DATABASE_URL at runtime. Run from the repo root so
        # `import comms` works.
        run_command: python -m alembic -c comms/migrations/alembic.ini upgrade head
        envs:
          - key: COMMS_DATABASE_URL
            scope: RUN_TIME
            value: ${comms-db.DATABASE_URL}
          - key: AUTH0_DOMAIN
            type: SECRET
            value: ${AUTH0_DOMAIN}
          - key: API_AUDIENCES
            value: ${COMMS_API_AUDIENCES}
          - key: COMMS_WEBHOOK_SECRET
            type: SECRET
            value: ${COMMS_WEBHOOK_SECRET}
    envs:
      # ── Database (comms' OWN logical DB on the shared cluster) ──────────
      # Auto-populated by App Platform from the `comms-db` component below.
      - key: COMMS_DATABASE_URL
        scope: RUN_TIME
        value: ${comms-db.DATABASE_URL}

      # ── Auth0 (shared Kaart tenant) ────────────────────────────────────
      - key: AUTH0_DOMAIN
        type: SECRET
        value: ${AUTH0_DOMAIN}
      # Comma-separated acceptable token audiences — one per client app, since
      # the Auth0 tenant is shared. Set as an app-level var, e.g.:
      #   https://mikro/api/authorize,https://Viewer/api/authorize,https://tasks.kaart.com/api
      - key: API_AUDIENCES
        value: ${COMMS_API_AUDIENCES}

      # ── Server-to-server (HMAC /emit) ──────────────────────────────────
      # SAME secret value must be set on every calling backend (mikro-backend,
      # Viewer backend, TM4 backend) so their signatures verify.
      - key: COMMS_WEBHOOK_SECRET
        type: SECRET
        value: ${COMMS_WEBHOOK_SECRET}

      # ── Email (Kaart Gmail SMTP) ───────────────────────────────────────
      # NOTE: variable names below match what comms/email/mailer.py and
      # comms/config.py actually read (SMTP_USERNAME / SMTP_PASSWORD /
      # SMTP_FROM_EMAIL / SMTP_FROM_NAME). The comms/README.md table uses
      # shorthand (SMTP_USER / SMTP_FROM) — these env keys are the source of
      # truth. SMTP_PASSWORD must be a Gmail APP PASSWORD, not the account
      # password (PENDING — see comms/deploy/README.md).
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        type: SECRET
        value: ${SMTP_USERNAME}
      - key: SMTP_PASSWORD
        type: SECRET
        value: ${SMTP_PASSWORD}
      - key: SMTP_FROM_EMAIL
        value: ${SMTP_FROM_EMAIL}
      - key: SMTP_FROM_NAME
        value: Kaart

      # ── Links in emails ────────────────────────────────────────────────
      - key: COMMS_BASE_URL
        value: ${APP_BASE_URL}

      # ── Optional (sensible defaults built into config.py) ──────────────
      # Per-app Auth0 custom-claim namespaces for org / roles. Override only if
      # a client app uses a namespace not in the default list.
      - key: ORG_CLAIM_KEYS
        value: mikro/org_id,tm/org_id,viewer/org_id,org_id
      - key: ROLES_CLAIM_KEYS
        value: mikro/roles,tm/roles,viewer/roles,roles
      # Bell-row retention window in days (default 90 if unset).
      - key: NOTIFICATION_RETENTION_DAYS
        value: "90"

databases:
  # Comms' OWN logical database. App Platform provisions a separate logical DB;
  # to put it on the SAME managed cluster as Mikro's `db`, set `cluster_name`
  # to the existing cluster's name (find it via `doctl databases list`). Drop
  # `cluster_name` to let App Platform create a fresh dev database instead.
  - name: comms-db
    engine: PG
    version: "16"
    # cluster_name: <existing-mikro-pg-cluster-name>   # share the cluster
    # production: true                                  # required when sharing
