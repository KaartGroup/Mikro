# Alembic config for the Kaart Comms service.
#
# Comms owns its OWN database and its OWN migration chain, completely
# independent of Mikro's backend/migrations/. The DB URL is NOT set here;
# env.py resolves it at runtime from COMMS_DATABASE_URL (falling back to the
# app's SQLALCHEMY_DATABASE_URI), so no connection string is ever hardcoded.
#
# Run from the repo root, e.g.:
#   COMMS_DATABASE_URL=... backend/venv/bin/python -m alembic \
#       -c comms/migrations/alembic.ini upgrade head

[alembic]
# Path to migration scripts, relative to this file's directory.
script_location = %(here)s

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# sqlalchemy.url is intentionally omitted — env.py supplies it.

[post_write_hooks]
# (none)

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
